services:
  # ----------Microservices----------
  gateway:
    restart: always
    build:
      context: ./src/Gateway
    entrypoint: ["dotnet", "Gateway.dll"]
    ports:
      - "8000:8000"
    environment:
      - ASPNETCORE_ENVIRONMENT=compose
    depends_on:
      - repository
      - identity
      - syncing
      - issue

  repository:
    restart: always
    build:
      context: .
      dockerfile: src/services/Repository/Dockerfile
    entrypoint: ["dotnet", "Repository.dll"]
    ports:
      - "5247:8000"
    environment:
      - ASPNETCORE_ENVIRONMENT=compose
      - MassTransit__Host=rabbitmq://rabbitmq:5672
    depends_on:
      repo-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  identity:
    restart: always
    build:
      context: ./src/services/Identity
    entrypoint: ["dotnet", "Identity.dll"]
    ports:
      - "5246:8000"
    environment:
      - ASPNETCORE_ENVIRONMENT=compose
    depends_on:
      - identity-db

  syncing:
    restart: always
    build:
      context: .
      dockerfile: src/services/Syncing/Dockerfile
    entrypoint: ["dotnet", "Syncing.dll"]
    ports:
      - "5248:8000"
    environment:
      - ASPNETCORE_ENVIRONMENT=compose
      - GitHub__ClientId=${GitHub__ClientId}
      - GitHub__ClientSecret=${GitHub__ClientSecret}
      - GitHub__AppId=${GitHub__AppId}
      - GitHub__AppSlug=${GitHub__AppSlug}
      - MassTransit__Host=rabbitmq://rabbitmq:5672
    volumes:
      - ${GitHub__PrivateKeyPath}:/app/secrets/github_private_key.pem:ro
    depends_on:
      identity:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  issue:
    restart: always
    build:
      context: .
      dockerfile: src/services/Issue/Dockerfile
    entrypoint: ["dotnet", "Issue.dll"]
    ports:
      - "5249:8000"
    environment:
      - ASPNETCORE_ENVIRONMENT=compose
      - MassTransit__Host=rabbitmq://rabbitmq:5672
    depends_on:
      issue-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    restart: always
    build:
      context: ./src/frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - gateway

  # ----------Database----------
  identity-db:
    restart: always
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identity_db
    ports:
      - "5433:5432"
    volumes:
      - identity_data:/var/lib/postgresql/data

  repo-db:
    restart: always
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repo_db
    ports:
      - "5432:5432"
    volumes:
      - repo_data:/var/lib/postgresql/data

  issue-db:
    restart: always
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: issue_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d issue_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5434:5432"
    volumes:
      - issue_data:/var/lib/postgresql/data

  # ----------MessageQueue----------
  rabbitmq:
    restart: always
    image: rabbitmq:management-alpine
    environment:
      - RABBITMQ_ERLANG_COOKIE=MYSECRETCOOKIE
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5672:5672" #AMQP
      - "15672:15672" #Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  repo_data:
  identity_data:
  issue_data:
  rabbitmq_data:
