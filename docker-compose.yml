version: "3.8"

services:
  # ----------Microservices----------
  gateway:
    build:
      context: ./src/gateway
      entrypoint: ["dotnet", "gateway.dll"]
    ports:
      - "8000:80"
    environment:
      - ASPNETCORE_HTTP_PORTS=80
      - ASPNETCORE_ENVIRONMENT=compose
    depends_on:
      - repository
      - identity

  repository:
    build:
      context: ./src/services/repository
      entrypoint: ["dotnet", "repository.dll"]
    ports:
      - "5247:80"
    environment:
      - ASPNETCORE_HTTP_PORTS=80
      - ASPNETCORE_ENVIRONMENT=compose
    depends_on:
      - repo-db

  identity:
    build:
      context: ./src/services/identity
      entrypoint: ["dotnet", "identity.dll"]
    ports:
      - "5246:80"
    environment:
      - ASPNETCORE_HTTP_PORTS=80
      - ASPNETCORE_ENVIRONMENT=compose
      - GitHub__ClientId=${GitHub__ClientId}
      - GitHub__ClientSecret=${GitHub__ClientSecret}
    depends_on:
      - identity-db

  # ----------Database----------
  identity-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: identity_db
    ports:
      - "5433:5432"
    volumes:
      - identity_data:/var/lib/postgresql/data

  repo-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: repo_db
    ports:
      - "5432:5432"
    volumes:
      - repo_data:/var/lib/postgresql/data

volumes:
  repo_data:
  identity_data:
